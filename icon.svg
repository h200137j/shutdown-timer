<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#261b10"/>
      <stop offset="1" stop-color="#0f0a06"/>
    </linearGradient>
    <linearGradient id="ember" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#ffc670"/>
      <stop offset="0.55" stop-color="#ff9a45"/>
      <stop offset="1" stop-color="#ff5f30"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <clipPath id="clip">
      <rect x="16" y="16" width="480" height="480" rx="112"/>
    </clipPath>
  </defs>

  <!-- plate -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="17.5" y="17.5" width="477" height="477" rx="110.5" fill="none"
        stroke="#ffb45c" stroke-opacity="0.10" stroke-width="3"/>

  <g clip-path="url(#clip)">
    <!-- faint dial ticks -->
    <g stroke="#4a3823" stroke-width="6" stroke-linecap="round" opacity="0.55">
      <line x1="256" y1="452" x2="256" y2="432"/>
      <line x1="60"  y1="256" x2="80"  y2="256"/>
      <line x1="452" y1="256" x2="432" y2="256"/>
      <line x1="117.4" y1="394.6" x2="131.5" y2="380.5"/>
      <line x1="394.6" y1="394.6" x2="380.5" y2="380.5"/>
      <line x1="117.4" y1="117.4" x2="131.5" y2="131.5"/>
      <line x1="394.6" y1="117.4" x2="380.5" y2="131.5"/>
    </g>

    <!-- ember glow -->
    <g filter="url(#glow)" opacity="0.6">
      <path d="M 325.5 125.3 A 148 148 0 1 1 186.5 125.3"
            fill="none" stroke="#ff8a3d" stroke-width="42" stroke-linecap="round"/>
      <line x1="256" y1="74" x2="256" y2="158" stroke="#ffb45c" stroke-width="42" stroke-linecap="round"/>
    </g>

    <!-- power-dial mark -->
    <path d="M 325.5 125.3 A 148 148 0 1 1 186.5 125.3"
          fill="none" stroke="url(#ember)" stroke-width="40" stroke-linecap="round"/>
    <line x1="256" y1="74" x2="256" y2="158" stroke="#ffc670" stroke-width="40" stroke-linecap="round"/>

    <!-- arc head spark -->
    <circle cx="325.5" cy="125.3" r="26" fill="#ffd9a0" opacity="0.9"/>
    <circle cx="325.5" cy="125.3" r="13" fill="#fff3dd"/>
  </g>
</svg>
